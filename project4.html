<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Car Showroom</title>
    <style>
      /* Global Styles */
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: "Poppins", sans-serif;
        background: #000;
        color: white;
      }

      /* Header */
      .header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 20px 50px;
        background: rgba(0, 0, 0, 0.8);
        position: sticky;
        top: 0;
        z-index: 10;
      }

      .header .logo {
        font-size: 1.5rem;
        font-weight: bold;
        color: #00ff00;
      }

      .header nav {
        display: flex;
        gap: 20px;
      }

      .header nav a {
        text-decoration: none;
        color: white;
        font-weight: 500;
        transition: color 0.3s;
      }

      .header nav a:hover,
      .header nav a.active {
        color: #00ff00;
      }

      .header .login-btn {
        background: #00ff00;
        color: black;
        padding: 10px 20px;
        border-radius: 5px;
        cursor: pointer;
        transition: background 0.3s ease;
      }

      .header .login-btn:hover {
        background: #00cc00;
      }

      /* Hero Section */
      .hero {
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        text-align: center;

        height: 100vh;
        position: relative;
      }

      .hero-content h1 {
        font-size: 3rem;
        margin-bottom: 20px;
        text-shadow: 2px 2px 10px rgba(0, 0, 0, 0.7);
      }

      .hero-content .book-btn {
        padding: 15px 30px;
        font-size: 1rem;
        color: rgb(0, 0, 0);
        background: #00ff00;
        border: none;
        cursor: pointer;
        border-radius: 5px;
        transition: background 0.3s ease;
      }

      .hero-content .book-btn:hover {
        background: #00cc00;
      }

      /* Search Section */
      .search-section {
        position: absolute;
        bottom: 50px;
        width: 90%;
        max-width: 800px;
        background: rgba(255, 255, 255, 0.1);
        padding: 20px;
        border-radius: 10px;
        display: flex;
        justify-content: space-between;
        gap: 10px;
        backdrop-filter: blur(10px);
      }

      .search-section input,
      .search-section select,
      .search-section .search-btn {
        padding: 10px;
        border: none;
        border-radius: 5px;
        font-size: 1rem;
      }

      .search-section input {
        flex: 2;
        background: rgba(255, 255, 255, 0.2);
        color: rgb(0, 0, 0);
      }

      .search-section select {
        flex: 1;
        background: rgba(255, 255, 255, 0.2);
        color: rgb(0, 0, 0);
      }

      .search-section .search-btn {
        flex: 0.5;
        background: #00ff00;
        color: black;
        cursor: pointer;
      }

      .search-section .search-btn:hover {
        background: #00cc00;
      }

      /* Cars Section */
      .cars {
        padding: 50px 20px;
        background: #111;
        text-align: center;
      }

      .cars h2 {
        margin-bottom: 20px;
        font-size: 2rem;
      }

      .car-gallery {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
        gap: 20px;
      }

      .car {
        background: #222;
        border-radius: 10px;
        padding: 15px;
        text-align: center;
        transition:
          transform 0.3s,
          box-shadow 0.3s;
      }

      .car img {
        width: 100%;
        border-radius: 10px;
        margin-bottom: 10px;
      }

      .car h3 {
        margin-bottom: 5px;
      }

      .car p {
        color: #aaa;
      }

      .car:hover {
        transform: translateY(-10px);
        box-shadow: 10px 50px 90px rgba(0, 255, 0, 0.2);
      }

      /* Footer */
      .footer {
        text-align: center;
        padding: 20px;
        background: rgba(0, 0, 0, 0.8);
        font-size: 0.9rem;
        color: #58ed13;
      }
    </style>
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap"
      rel="stylesheet"
    />
  </head>

            <option value="SUV">SUV</option>
            <option value="Sedan">Sedan</option>
          </select>
          <button type="submit" class="search-btn">Search</button>
        </form>
      </div>
    </section>

      cars.forEach((car) => {
